<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مبادرة "بنكمل بعض" | الرئيسية</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --primary: #1e3a8a; --gold: #ffd700; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: #333; }
        
        /* الهيدر */
        header { background: var(--primary); color: white; padding: 40px 20px; text-align: center; border-bottom: 5px solid var(--gold); }
        .logo-text { font-size: 2.5rem; margin: 0; font-weight: bold; }
        
        /* قسم البث المباشر السريع */
        .live-status-bar { background: #fff; padding: 15px; margin: -30px auto 20px; width: 80%; max-width: 600px; border-radius: 50px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .dot { height: 12px; width: 12px; border-radius: 50%; margin-left: 10px; }
        .online-dot { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; animation: blink 1s infinite; }
        .offline-dot { background: #94a3b8; }

        /* شبكة الخدمات */
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px; max-width: 1200px; margin: auto; }
        .card { background: white; padding: 30px; border-radius: 15px; text-align: center; transition: 0.3s; cursor: pointer; border: 1px solid #e2e8f0; text-decoration: none; color: inherit; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); border-color: var(--primary); }
        .card i { font-size: 3rem; color: var(--primary); margin-bottom: 15px; display: block; }
        .card h3 { margin: 10px 0; color: var(--primary); }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div class="logo-text">مبادرة "بنكمل بعض"</div>
        <p>المنصة الرسمية لتمكين 100 مليون شاب عربي</p>
    </header>

    <div class="live-status-bar" id="statusBox">
        <span id="dotStatus" class="dot offline-dot"></span>
        <span id="textStatus">جاري فحص حالة البث...</span>
    </div>

    <div class="services-grid">
        <a href="live.html" class="card">
            <i>📺</i>
            <h3>البث المباشر</h3>
            <p>انضم الآن للمحاضرات واللقاءات الحية</p>
        </a>

        <a href="courses.html" class="card">
            <i>🎓</i>
            <h3>الأكاديمية الرقمية</h3>
            <p>تصفح الدورات التدريبية المعتمدة</p>
        </a>

        <a href="register.html" class="card">
            <i>📝</i>
            <h3>انضم للمبادرة</h3>
            <p>كن جزءاً من التغيير وسجل بياناتك</p>
        </a>

        <a href="admin-control.html" class="card" style="border-style: dashed;">
            <i>⚙️</i>
            <h3>إدارة المنصة</h3>
            <p>خاص بالإدارة فقط</p>
        </a>
    </div>

    <script>
        const socket = io();
        socket.on('syncState', (state) => {
            const dot = document.getElementById('dotStatus');
            const text = document.getElementById('textStatus');
            if(state.liveStatus === 'online') {
                dot.className = "dot online-dot";
                text.innerText = "بث مباشر الآن - اضغط للدخول";
                text.style.color = "#166534";
            } else {
                dot.className = "dot offline-dot";
                text.innerText = "لا يوجد بث حالياً";
                text.style.color = "#64748b";
            }
        });
    </script>
</body>
</html>
