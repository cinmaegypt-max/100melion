<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مبادرة بنكمل بعض | البث المباشر</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { background: #1e3a8a; color: white; width: 100%; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .live-container { background: white; margin-top: 30px; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 90%; max-width: 800px; text-align: center; }
        #videoArea { background: #000; width: 100%; aspect-ratio: 16/9; border-radius: 10px; margin-top: 20px; display: flex; align-items: center; justify-content: center; color: #666; font-size: 1.2rem; }
        .status-dot { height: 12px; width: 12px; background-color: #bbb; border-radius: 50%; display: inline-block; margin-left: 8px; }
        .online .status-dot { background-color: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
    </style>
</head>
<body>

    <header>
        <h1>مبادرة "بنكمل بعض"</h1>
        <p>المنصة الرسمية لبث الفعاليات لـ 100 مليون شاب</p>
    </header>

    <div class="live-container">
        <div id="statusText" class="offline">
            <span class="status-dot"></span>
            <span id="label">البث متوقف حالياً</span>
        </div>
        
        <div id="videoArea">
            <div id="msg">بانتظار بدء البث من الإدارة...</div>
        </div>
    </div>

    <script>
        // الربط بالسيرفر تلقائياً عبر اللينك الخاص بك
        const socket = io();

        socket.on('syncState', (state) => {
            const videoArea = document.getElementById('videoArea');
            const statusText = document.getElementById('statusText');
            const label = document.getElementById('label');

            if(state.liveStatus === 'online') {
                statusText.className = "online";
                label.innerText = "بث مباشر الآن";
                videoArea.innerHTML = `<iframe width="100%" height="100%" src="${state.streamUrl}" frameborder="0" allowfullscreen></iframe>`;
            } else {
                statusText.className = "offline";
                label.innerText = "البث متوقف حالياً";
                videoArea.innerHTML = '<div id="msg">بانتظار بدء البث من الإدارة...</div>';
            }
        });
    </script>
</body>
</html>
