<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بنكمل بعض | الرئيسية</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="ticker-wrap"><div class="ticker-text" id="tickerDisplay">.. جاري جلب الأخبار ..</div></div>
    
    <header class="main-header">
        <div class="logo">بنكمل بعض</div>
        <nav>
            <ul class="nav-menu">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="profile.html">ملفي الشخصي</a></li>
                <li><a href="dashboard.html">الإدارة</a></li>
            </ul>
        </nav>
    </header>

    <div class="container" id="feed">
        </div>

    <script>
        const socket = io();
        socket.on('syncState', (state) => {
            document.getElementById('tickerDisplay').innerText = state.tickerMessage;
            
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            
            state.articles.forEach(post => {
                feed.innerHTML += `
                    <div class="card">
                        <small style="color:gray;">${post.date}</small>
                        <h2 style="color:var(--primary);">${post.title}</h2>
                        <p>${post.desc}</p>
                        ${post.img ? `<img src="${post.img}" style="width:100%; border-radius:10px; margin-top:10px;">` : ''}
                        ${post.video ? `
                            <video controls style="width:100%; border-radius:10px; margin-top:10px; background:black;">
                                <source src="${post.video}" type="video/mp4">
                            </video>` : ''}
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
