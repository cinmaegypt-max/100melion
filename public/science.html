<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لجنة العلوم والبحث العلمي | بنكمل بعض</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .hero { background: #2ecc71; color: white; padding: 60px 20px; text-align: center; }
        .science-card { max-width: 700px; margin: -50px auto 50px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .upload-area { border: 2px dashed #2ecc71; padding: 30px; text-align: center; cursor: pointer; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>لجنة العلوم والبحث العلمي</h1>
        <p>منصة الباحثين والمبتكرين العرب</p>
    </div>

    <div class="container">
        <div class="science-card">
            <div id="uploadContainer">
                <h3>ارفع ملف بحثك بصيغة PDF هنا</h3>
                <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                    <p>اضغط هنا لاختيار الملف من جهازك</p>
                    <input type="file" id="fileInput" accept=".pdf" style="display:none">
                </div>
                <button type="button" class="btn-submit" style="margin-top:15px; background:#2ecc71;" onclick="uploadFile()">تقديم بحث علمي</button>
            </div>
            <div id="result" style="display:none; text-align:center;">
                <h3 style="color:#2ecc71;">✅ تم رفع البحث بنجاح!</h3>
                <p>رقم المرجع الخاص بك هو: #SC-2026</p>
            </div>
        </div>
    </div>

    <script>
        function uploadFile() {
            const file = document.getElementById('fileInput').files[0];
            if(!file) { alert('من فضلك اختر ملف أولاً'); return; }
            document.getElementById('uploadContainer').style.display = 'none';
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
