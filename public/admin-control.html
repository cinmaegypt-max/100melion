<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | الإدارة</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        .admin-container { max-width: 800px; margin: 30px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .section { border-bottom: 1px solid #eee; padding: 20px 0; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #1e3a8a; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        button.stop { background: #e74c3c; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h2>🚀 لوحة التحكم في المنصة</h2>

        <div class="section">
            <h3>🎥 إدارة البث المباشر</h3>
            <input type="text" id="liveUrl" placeholder="رابط فيديو اليوتيوب">
            <button onclick="updateLive('online')">بدء البث</button>
            <button class="stop" onclick="updateLive('offline')">إيقاف البث</button>
        </div>

        <div class="section">
            <h3>📢 شريط الأخبار العاجلة</h3>
            <input type="text" id="tickerMsg" placeholder="اكتب الخبر الجديد هنا...">
            <button onclick="updateTicker()">تحديث شريط الإعلانات</button>
        </div>

        <div class="section">
            <h3>📝 نشر مقال/صورة جديدة</h3>
            <input type="text" id="artTitle" placeholder="العنوان">
            <textarea id="artContent" placeholder="المحتوى..."></textarea>
            <button onclick="postArticle()">نشر في الموقع</button>
        </div>
    </div>

    <script>
        const socket = io();
        function updateLive(status) {
            const url = document.getElementById('liveUrl').value;
            socket.emit('adminUpdate', { type: 'LIVE', status: status, url: url });
            alert("تم تحديث حالة البث");
        }
        function updateTicker() {
            const msg = document.getElementById('tickerMsg').value;
            socket.emit('adminUpdate', { type: 'TICKER', message: msg });
            alert("تم تحديث شريط الأخبار");
        }
    </script>
</body>
</html>
