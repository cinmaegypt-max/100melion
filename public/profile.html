<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ملفي الشخصي | بنكمل بعض</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .profile-header { background: var(--primary); color: white; padding: 40px 20px; text-align: center; border-radius: 0 0 50px 50px; }
        .user-avatar { width: 120px; height: 120px; border-radius: 60px; border: 5px solid white; background: #eee; margin: -60px auto 20px auto; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .access-card { background: #fff3cd; border: 2px dashed #ffa502; padding: 20px; border-radius: 15px; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo">بنكمل بعض</div>
        <nav><ul class="nav-menu"><li><a href="index.html">الرئيسية</a></li><li><a href="courses.html">المنصة</a></li></ul></nav>
    </header>

    <div class="profile-header">
        <h1 id="pName">تحميل...</h1>
        <p id="pRole">عضو المبادرة</p>
    </div>

    <div class="container">
        <div class="user-avatar">
            <i class="fas fa-user-tie fa-4x" style="color: #ccc;"></i>
        </div>

        <div class="access-card">
            <h3>كود دخول البث المباشر</h3>
            <div id="liveCodeDisplay" style="font-size: 2.5rem; font-weight: bold; color: var(--primary);">998877</div>
            <p><small>هذا الكود خاص بك لدخول المحاضرات اليومية.</small></p>
        </div>

        <div class="info-grid">
            <div class="card">
                <h4><i class="fas fa-id-card"></i> البيانات</h4>
                <p>تاريخ الانضمام: <span id="regDate">--/--/----</span></p>
                <p>الحالة: عضو نشط</p>
            </div>
            <div class="card">
                <h4><i class="fas fa-envelope"></i> التواصل</h4>
                <p id="pEmail">--</p>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const rawData = localStorage.getItem('userData');
            if (rawData) {
                const userData = JSON.parse(rawData);
                document.getElementById('pName').innerText = userData.name;
                document.getElementById('pRole').innerText = "تخصص: " + userData.role;
                document.getElementById('pEmail').innerText = userData.email;
                document.getElementById('regDate').innerText = userData.regDate;
            } else {
                window.location.href = "register.html"; // إذا لم يسجل يرجعه لصفحة التسجيل
            }
        }
    </script>
</body>
</html>
