<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لجنة الثقافة والفنون | بنكمل بعض</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .hero-section { background: #ffd700; color: #1e3a8a; padding: 60px 20px; text-align: center; }
        .culture-card { max-width: 600px; margin: -50px auto 50px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="hero-section">
        <h1>لجنة الثقافة والفنون</h1>
        <p>نحتفي بالإبداع والمبدعين</p>
    </div>

    <div class="container">
        <div class="culture-card">
            <h3>مجالات عمل اللجنة:</h3>
            <ul style="color: #555; margin-bottom: 20px;">
                <li>دعم المؤلفين والروائيين الشباب.</li>
                <li>تنظيم مهرجانات الفنون التشكيلية والمسرح.</li>
                <li>نشر الوعي بالهوية الثقافية العربية.</li>
            </ul>

            <form>
                <label>اختر المسار التدريبي:</label>
                <select required>
                    <option value="">-- اختر المسار --</option>
                    <option>الكتابة الإبداعية</option>
                    <option>الفنون التشكيلية</option>
                    <option>المسرح والتمثيل</option>
                </select>
                <button type="submit" class="btn-submit">انضم للمسار التدريبي الآن</button>
            </form>
        </div>
    </div>
</body>
</html>
