<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>البث المباشر | بنكمل بعض</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        .live-grid { display: grid; grid-template-columns: 3fr 1fr; gap: 20px; margin-top: 20px; }
        #chatBox { background: white; height: 450px; display: flex; flex-direction: column; border-radius: 10px; border: 1px solid #ddd; }
        #messages { flex: 1; padding: 10px; overflow-y: auto; }
        .msg { padding: 8px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo">بنكمل بعض - مباشر</div>
        <nav>
            <ul class="nav-menu">
                <li><a href="profile.html">العودة للملف الشخصي</a></li>
                <li><a href="courses.html">المنصة</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div id="lockScreen" class="card" style="text-align: center;">
            <h2>أدخل كود المرور المخصص لك</h2>
            <input type="text" id="userCodeInput" style="width: 150px; font-size: 2rem; text-align: center;">
            <button onclick="checkCode()" class="btn-submit">دخول</button>
        </div>

        <div id="liveView" class="live-grid" style="display: none;">
            <div class="card" id="videoArea" style="height: 500px; background: black; display: flex; align-items: center; justify-content: center; color: white;">
                <h3>جاري الاتصال بالبث...</h3>
            </div>
            
            <div id="chatBox">
                <div id="messages"></div>
                <div style="padding: 10px; display: flex; gap: 5px;">
                    <input type="text" id="chatInput" placeholder="اكتب سؤالك هنا...">
                    <button onclick="sendMsg()" class="btn-submit" style="width: auto; padding: 10px;">إرسال</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let serverCode = "";

        socket.on('syncState', (state) => {
            serverCode = state.accessCode;
            const videoArea = document.getElementById('videoArea');
            if(state.liveStatus === 'online') {
                videoArea.innerHTML = `<iframe width="100%" height="100%" src="${state.streamUrl}" frameborder="0" allowfullscreen></iframe>`;
            } else {
                videoArea.innerHTML = "<h2>البث متوقف الآن</h2>";
            }
        });

        function checkCode() {
            const input = document.getElementById('userCodeInput').value;
            if(input === serverCode || input === "MASTER") {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('liveView').style.display = 'grid';
            } else { alert("الكود خاطئ"); }
        }

        function sendMsg() {
            const input = document.getElementById('chatInput');
            const userData = JSON.parse(localStorage.getItem('userData')) || {name: "متدرب"};
            socket.emit('sendChatMessage', { user: userData.name, text: input.value });
            input.value = "";
        }

        socket.on('newChatMessage', (data) => {
            const msgDiv = document.getElementById('messages');
            msgDiv.innerHTML += `<div class="msg"><b>${data.user}:</b> ${data.text}</div>`;
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });
    </script>
</body>
</html>
