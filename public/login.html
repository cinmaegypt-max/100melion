<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول | بنكمل بعض</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="margin-top: 100px;">
        <div class="card" style="max-width: 400px; margin: auto; text-align: center;">
            <h2>تسجيل الدخول</h2>
            <form id="loginForm">
                <input type="email" placeholder="البريد الإلكتروني" required>
                <input type="password" placeholder="كلمة المرور" required>
                <button type="submit" class="btn-submit">دخول</button>
            </form>
            <p style="margin-top: 15px;">ليس لديك حساب؟ <a href="register.html">سجل الآن</a></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            
            // يمكنك إضافة فحص بسيط هنا (مثلاً: لو البريد صح انقل للمنصة)
            window.location.href = "courses.html"; 
        };
    </script>
</body>
</html>
