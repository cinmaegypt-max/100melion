<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تواصل معنا | بنكمل بعض</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">الدعم الفني للمبادرة</div>
    </header>

    <div class="container" style="max-width: 700px;">
        <div class="card">
            <h2><i class="fas fa-envelope"></i> راسل مكتب دولتك</h2>
            <p>اختر المكتب الإقليمي التابع لدولتك لسرعة الرد</p>
            <form>
                <select>
                    <option>المكتب الإقليمي - مصر</option>
                    <option>المكتب الإقليمي - السعودية</option>
                    <option>المكتب الإقليمي - المغرب</option>
                    <option>الإدارة العامة للمبادرة</option>
                </select>
                <input type="text" placeholder="موضوع الرسالة">
                <textarea rows="5" placeholder="اكتب تفاصيل استفسارك هنا..."></textarea>
                <button type="button" class="btn-submit" onclick="alert('تم إرسال رسالتك بنجاح!')">إرسال الرسالة</button>
            </form>
        </div>
    </div>
</body>
</html>
