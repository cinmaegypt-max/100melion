<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>انضم لنا | بنكمل بعض</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">بنكمل بعض</div>
    </header>

    <div class="container">
        <div class="card" style="max-width: 500px; margin: auto;">
            <h2>إنشاء حساب عضوية</h2>
            <form id="registrationForm">
                <input type="text" id="userName" placeholder="الاسم الرباعي كما في البطاقة" required>
                <input type="email" id="userEmail" placeholder="البريد الإلكتروني" required>
                <select id="userRole" required>
                    <option value="">اختر التخصص</option>
                    <option value="ريادة الأعمال">ريادة الأعمال</option>
                    <option value="البحث العلمي">البحث العلمي</option>
                    <option value="الثقافة والفنون">الثقافة والفنون</option>
                </select>
                <button type="submit" class="btn-submit">إنشاء الحساب ودخول البروفايل</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('registrationForm').onsubmit = function(e) {
            e.preventDefault();
            
            // حفظ البيانات في ذاكرة المتصفح
            const userData = {
                name: document.getElementById('userName').value,
                role: document.getElementById('userRole').value,
                email: document.getElementById('userEmail').value,
                regDate: new Date().toLocaleDateString()
            };

            localStorage.setItem('userData', JSON.stringify(userData));

            // التوجيه التلقائي
            alert('أهلاً بك في المبادرة! جاري تجهيز ملفك الشخصي...');
            window.location.href = "profile.html";
        };
    </script>
</body>
</html>
