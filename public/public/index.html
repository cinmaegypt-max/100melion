<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة مبادرة بنكمل بعض | البث المباشر</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --primary: #1e3a8a; --accent: #ffd700; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 0; direction: rtl; }
        .main-header { background: var(--primary); color: white; padding: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .container { max-width: 800px; margin: 30px auto; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        #videoArea { background: #000; width: 100%; height: 400px; border-radius: 10px; margin-top: 20px; display: flex; align-items: center; justify-content: center; color: #fff; overflow: hidden; }
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; margin-bottom: 10px; }
        .online { background: #dcfce7; color: #166534; }
        .offline { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

    <header class="main-header">
        <h1>مبادرة "بنكمل بعض"</h1>
        <p>المنصة الرسمية لبث المحتوى الثقافي والعلمي</p>
    </header>

    <div class="container">
        <div class="card">
            <div id="statusBadge" class="status-badge offline">البث متوقف حالياً</div>
            <h2 id="streamTitle">قاعة البث التفاعلية</h2>
            
            <div id="videoArea">
                <div id="placeholder">بانتظار بدء البث من قبل الإدارة...</div>
            </div>

            <div style="margin-top: 20px; color: #666;">
                <p>مرحباً بك في المنصة الرقمية التي تستهدف 100 مليون شاب عربي.</p>
            </div>
        </div>
    </div>

    <script>
        // الاتصال بالسيرفر
        const socket = io();

        // استقبال التحديثات ريل تايم
        socket.on('syncState', (state) => {
            const videoArea = document.getElementById('videoArea');
            const statusBadge = document.getElementById('statusBadge');
            
            if(state.liveStatus === 'online') {
                statusBadge.innerText = "بث مباشر الآن";
                statusBadge.className = "status-badge online";
                videoArea.innerHTML = `<iframe width="100%" height="100%" src="${state.streamUrl}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            } else {
                statusBadge.innerText = "البث متوقف حالياً";
                statusBadge.className = "status-badge offline";
                videoArea.innerHTML = '<div id="placeholder">بانتظار بدء البث من قبل الإدارة...</div>';
            }
        });
    </script>
</body>
</html>
