<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الإدارة الشاملة | بنكمل بعض</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        .admin-container { display: grid; grid-template-columns: 250px 1fr; min-height: 100vh; }
        .sidebar { background: var(--primary); color: white; padding: 20px; }
        .sidebar h2 { font-size: 1.2rem; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .menu-item { padding: 15px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; }
        .menu-item:hover, .menu-item.active { background: var(--accent); color: var(--primary); font-weight: bold; }
        
        .main-content { padding: 30px; background: #f4f7f6; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stat-card i { font-size: 2rem; color: var(--primary); margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="sidebar">
            <h2>الإدارة المركزية</h2>
            <div class="menu-item active" onclick="showTab('overview')"><i class="fas fa-chart-line"></i> نظرة عامة</div>
            <div class="menu-item" onclick="showTab('live-settings')"><i class="fas fa-video"></i> إدارة البث المباشر</div>
            <div class="menu-item" onclick="showTab('ticker-settings')"><i class="fas fa-bullhorn"></i> شريط الأخبار</div>
            <div class="menu-item" onclick="showTab('users-manage')"><i class="fas fa-users"></i> إدارة الأعضاء</div>
            <div class="menu-item" onclick="showTab('content-manage')"><i class="fas fa-edit"></i> محتوى المنصة</div>
        </div>

        <div class="main-content">
            
            <div id="overview" class="tab-content active">
                <h3>إحصائيات المنصة</h3>
                <div class="stat-grid">
                    <div class="stat-card"><i class="fas fa-user-graduate"></i><div id="countUsers">150</div><p>عضو مسجل</p></div>
                    <div class="stat-card"><i class="fas fa-certificate"></i><div>45</div><p>شهادة صادرة</p></div>
                    <div class="stat-card"><i class="fas fa-signal"></i><div style="color: green;">نشط</div><p>حالة السيرفر</p></div>
                </div>
            </div>

            <div id="live-settings" class="tab-content">
                <div class="card">
                    <h3>التحكم في البث المباشر</h3>
                    <label>حالة البث:</label>
                    <select id="liveStatus">
                        <option value="online">مباشر الآن (Online)</option>
                        <option value="offline">متوقف (Offline)</option>
                    </select>
                    <label>رابط البث (YouTube Embed URL):</label>
                    <input type="text" id="streamUrl" placeholder="https://www.youtube.com/embed/...">
                    <label>كود دخول المحاضرة:</label>
                    <input type="text" id="accessCode" placeholder="مثلاً: 123456">
                    <button class="btn-submit" onclick="updateLive()">تحديث البث فوراً</button>
                </div>
            </div>

            <div id="ticker-settings" class="tab-content">
                <div class="card">
                    <h3>تعديل شريط الأخبار العلوي</h3>
                    <textarea id="tickerInput" rows="4" placeholder="اكتب الخبر الذي سيظهر لكل المستخدمين هنا..."></textarea>
                    <button class="btn-submit" onclick="updateTicker()">نشر الخبر</button>
                </div>
            </div>

            <div id="users-manage" class="tab-content">
                <div class="card">
                    <h3>قائمة الأعضاء المسجلين</h3>
                    <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                        <tr style="background: #eee;">
                            <th style="padding: 10px;">الاسم</th>
                            <th>اللجنة</th>
                            <th>البريد</th>
                            <th>الإجراء</th>
                        </tr>
                        <tr>
                            <td style="padding: 10px;">أحمد علي</td>
                            <td>ريادة أعمال</td>
                            <td>ahmed@mail.com</td>
                            <td><button style="color: red; border:none; cursor:pointer;">حذف</button></td>
                        </tr>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        const socket = io();

        // التبديل بين الأقسام
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // تحديث البث
        function updateLive() {
            const data = {
                liveStatus: document.getElementById('liveStatus').value,
                streamUrl: document.getElementById('streamUrl').value,
                accessCode: document.getElementById('accessCode').value
            };
            socket.emit('updateState', data);
            alert("تم تحديث إعدادات البث!");
        }

        // تحديث شريط الأخبار
        function updateTicker() {
            const msg = document.getElementById('tickerInput').value;
            socket.emit('updateState', { tickerMessage: msg });
            alert("تم تحديث الخبر!");
        }

        // جلب الإحصائيات (تنبيه: تحتاج لربط قاعدة بيانات لتعمل فعلياً)
        socket.on('syncState', (state) => {
            if(state.tickerMessage) document.getElementById('tickerInput').value = state.tickerMessage;
            if(state.accessCode) document.getElementById('accessCode').value = state.accessCode;
        });
    </script>
</body>
</html>
