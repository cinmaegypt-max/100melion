<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | بنكمل بعض</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body style="background: #f0f2f5;">
    <div class="container">
        <div class="card">
            <h2><i class="fas fa-upload"></i> رفع محتوى جديد (صور وفيديو)</h2>
            <form id="uploadForm">
                <input type="text" name="title" placeholder="عنوان المنشور" required>
                <textarea name="desc" placeholder="اكتب وصفاً أو مقالاً هنا..."></textarea>
                
                <label>صورة من الجهاز:</label>
                <input type="file" name="image" accept="image/*">
                
                <label>فيديو من الجهاز:</label>
                <input type="file" name="video" accept="video/*">
                
                <button type="button" class="btn-submit" id="upBtn" onclick="doUpload()">نشر الآن على الرئيسية</button>
                <p id="msg" style="display:none; color:blue;">جاري الرفع... يرجى عدم إغلاق الصفحة</p>
            </form>
        </div>

        <div class="card">
            <h2><i class="fas fa-video"></i> تحكم البث والأخبار</h2>
            <input type="text" id="tMsg" placeholder="تحديث شريط الأخبار">
            <button class="btn-submit" onclick="updateTicker()" style="background:var(--accent); color:black;">تحديث الشريط</button>
        </div>
    </div>

    <script>
        const socket = io();

        async function doUpload() {
            const btn = document.getElementById('upBtn');
            const msg = document.getElementById('msg');
            const formData = new FormData(document.getElementById('uploadForm'));

            btn.disabled = true;
            msg.style.display = 'block';

            try {
                const res = await fetch('/upload-content', { method: 'POST', body: formData });
                if (res.ok) {
                    alert("تم الرفع والنشر بنجاح!");
                    document.getElementById('uploadForm').reset();
                }
            } catch (e) { alert("خطأ في الرفع"); }
            
            btn.disabled = false;
            msg.style.display = 'none';
        }

        function updateTicker() {
            const val = document.getElementById('tMsg').value;
            socket.emit('updateState', { tickerMessage: val });
            alert("تم التحديث");
        }
    </script>
</body>
</html>
