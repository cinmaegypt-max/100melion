<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الإدارة | بنكمل بعض</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        .admin-layout { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
        .sidebar { background: var(--primary); color: white; padding: 25px; }
        .nav-btn { padding: 15px; margin-bottom: 10px; cursor: pointer; border-radius: 10px; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-btn.active { background: var(--accent); color: var(--primary); font-weight: bold; }
        .main-view { padding: 40px; background: #f8f9fa; }
        .tab { display: none; } .tab.active { display: block; }
        input, textarea { margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="admin-layout">
        <div class="sidebar">
            <h2>إدارة المنصة</h2><br>
            <div class="nav-btn active" onclick="showTab('publishTab')"><i class="fas fa-upload"></i> رفع محتوى جديد</div>
            <div class="nav-btn" onclick="showTab('liveTab')"><i class="fas fa-video"></i> البث المباشر</div>
            <div class="nav-btn" onclick="showTab('newsTab')"><i class="fas fa-bullhorn"></i> شريط الأخبار</div>
        </div>

        <div class="main-view">
            <div id="publishTab" class="tab active card">
                <h3>رفع فيديو وصور للمنصة</h3>
                <form id="contentForm">
                    <input type="text" name="title" placeholder="عنوان المنشور" required>
                    <textarea name="desc" placeholder="وصف المحتوى"></textarea>
                    <label>صورة المنشور:</label>
                    <input type="file" name="image" accept="image/*">
                    <label>فيديو المنشور:</label>
                    <input type="file" name="video" accept="video/*">
                    <button type="button" class="btn-submit" onclick="submitContent()">بدء الرفع والنشر</button>
                    <p id="statusMsg" style="margin-top:10px; color:blue; display:none;">جاري الرفع... يرجى الانتظار</p>
                </form>
            </div>

            <div id="liveTab" class="tab card">
                <h3>إعدادات البث</h3>
                <select id="lStatus"><option value="online">مباشر</option><option value="offline">متوقف</option></select>
                <input type="text" id="lUrl" placeholder="رابط YouTube Embed">
                <input type="text" id="lCode" placeholder="كود دخول البث">
                <button class="btn-submit" onclick="updateLive()">حفظ</button>
            </div>
            
            <div id="newsTab" class="tab card">
                <h3>تحديث الشريط الإعلاني</h3>
                <textarea id="tMsg" placeholder="اكتب الخبر هنا"></textarea>
                <button class="btn-submit" onclick="updateTicker()">تحديث</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        function showTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        async function submitContent() {
            const form = document.getElementById('contentForm');
            const formData = new FormData(form);
            const status = document.getElementById('statusMsg');
            status.style.display = 'block';

            const res = await fetch('/upload-content', { method: 'POST', body: formData });
            if (res.ok) {
                alert("تم النشر بنجاح!");
                form.reset();
                status.style.display = 'none';
            }
        }

        function updateLive() {
            socket.emit('updateState', {
                liveStatus: document.getElementById('lStatus').value,
                streamUrl: document.getElementById('lUrl').value,
                accessCode: document.getElementById('lCode').value
            });
            alert("تم التحديث");
        }

        function updateTicker() {
            socket.emit('updateState', { tickerMessage: document.getElementById('tMsg').value });
            alert("تم التحديث");
        }
    </script>
</body>
</html>
