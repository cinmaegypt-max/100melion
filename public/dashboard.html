<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الإدارة | بنكمل بعض</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        .admin-layout { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
        .sidebar { background: #1e3a8a; color: white; padding: 25px; }
        .nav-btn { padding: 15px; margin-bottom: 10px; cursor: pointer; border-radius: 10px; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-btn:hover, .nav-btn.active { background: #ffd700; color: #1e3a8a; }
        .main-view { padding: 40px; background: #f8f9fa; }
        .tab { display: none; } .tab.active { display: block; }
        form label { display: block; margin-top: 15px; font-weight: bold; }
        .progress-bar { height: 10px; background: #eee; border-radius: 5px; margin-top: 10px; display: none; overflow: hidden; }
        .progress-fill { height: 100%; background: #2ecc71; width: 0%; transition: 0.2s; }
    </style>
</head>
<body>
    <div class="admin-layout">
        <div class="sidebar">
            <h2>إدارة المنصة</h2><br>
            <div class="nav-btn active" onclick="showTab('publishTab')"><i class="fas fa-upload"></i> رفع محتوى جديد</div>
            <div class="nav-btn" onclick="showTab('liveTab')"><i class="fas fa-video"></i> البث المباشر</div>
            <div class="nav-btn" onclick="showTab('newsTab')"><i class="fas fa-bullhorn"></i> شريط الأخبار</div>
        </div>

        <div class="main-view">
            <div id="publishTab" class="tab active card">
                <h3>نشر مقال / فيديو / صور من الجهاز</h3>
                <form id="contentForm">
                    <input type="text" id="title" name="title" placeholder="عنوان المنشور" required>
                    <textarea id="desc" name="desc" placeholder="نص المقال أو وصف الفيديو"></textarea>
                    
                    <label>ارفق صورة:</label>
                    <input type="file" name="image" accept="image/*">
                    
                    <label>ارفق فيديو:</label>
                    <input type="file" name="video" accept="video/*">
                    
                    <button type="button" class="btn-submit" onclick="submitContent()">نشر الآن</button>
                    <div class="progress-bar" id="pBar"><div class="progress-fill" id="pFill"></div></div>
                </form>
            </div>

            <div id="liveTab" class="tab card">
                <h3>إعدادات البث المباشر</h3>
                <label>حالة البث:</label>
                <select id="lStatus"><option value="online">مباشر</option><option value="offline">متوقف</option></select>
                <label>رابط YouTube Embed:</label>
                <input type="text" id="lUrl" placeholder="https://www.youtube.com/embed/...">
                <label>كود دخول المحاضرة:</label>
                <input type="text" id="lCode" placeholder="998877">
                <button class="btn-submit" onclick="updateLive()">حفظ الإعدادات</button>
            </div>

            <div id="newsTab" class="tab card">
                <h3>تحديث شريط الأخبار</h3>
                <textarea id="tMsg" rows="4"></textarea>
                <button class="btn-submit" onclick="updateTicker()">تحديث</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        function showTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        async function submitContent() {
            const form = document.getElementById('contentForm');
            const formData = new FormData(form);
            const pBar = document.getElementById('pBar');
            const pFill = document.getElementById('pFill');

            pBar.style.display = 'block';
            pFill.style.width = '50%'; // وهمي لتبسيط الكود

            const res = await fetch('/upload-content', { method: 'POST', body: formData });
            if (res.ok) {
                pFill.style.width = '100%';
                setTimeout(() => { alert("تم النشر!"); pBar.style.display = 'none'; form.reset(); }, 500);
            }
        }

        function updateLive() {
            socket.emit('updateState', {
                liveStatus: document.getElementById('lStatus').value,
                streamUrl: document.getElementById('lUrl').value,
                accessCode: document.getElementById('lCode').value
            });
            alert("تم تحديث البث");
        }

        function updateTicker() {
            socket.emit('updateState', { tickerMessage: document.getElementById('tMsg').value });
            alert("تم تحديث الخبر");
        }
    </script>
</body>
</html>
