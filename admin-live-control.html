<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم العليا</title>
    <script src="https://100melion-production.up.railway.app/socket.io/socket.io.js"></script>
</head>
<body>
    <h1>تحكم المنصة الرسمي</h1>
    <input type="text" id="streamUrl" placeholder="رابط اليوتيوب هنا">
    <button onclick="start()">تشغيل البث للكل</button>
    <button onclick="stop()">إيقاف البث</button>
    <h3 id="code">الكود الحالي: ------</h3>
    <button onclick="newCode()">تغيير كود دخول المتدربين</button>

    <script>
        const socket = io("https://100melion-production.up.railway.app");

        socket.on('syncState', (state) => {
            document.getElementById('code').innerText = "الكود الحالي: " + state.accessCode;
        });

        function start() {
            const url = document.getElementById('streamUrl').value;
            socket.emit('adminCommand', { action: 'START_LIVE', url: url });
        }

        function stop() {
            socket.emit('adminCommand', { action: 'STOP_LIVE' });
        }

        function newCode() {
            socket.emit('adminCommand', { action: 'REFRESH_CODE' });
        }
    </script>
</body>
</html>
