<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اللجان التنفيذية | بنكمل بعض</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .committee-box { border-right: 10px solid var(--primary); padding-right: 20px; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo">لجان المبادرة</div>
    </header>

    <div class="container">
        <div class="committee-box card">
            <h2>1. لجنة الثقافة والفنون</h2>
            <p>المسؤولية: دعم المؤلفين الشباب، مهرجان "سلام عربي"، والتبادل الثقافي.</p>
        </div>
        <div class="committee-box card" style="border-color: #2ed573;">
            <h2>2. لجنة العلوم والبحث</h2>
            <p>المسؤولية: مناقشة أبحاث الماجستير والدكتوراه، الابتكار التقني.</p>
        </div>
        <div class="committee-box card" style="border-color: #ffa502;">
            <h2>3. لجنة ريادة الأعمال</h2>
            <p>المسؤولية: تمويل المشاريع الصغيرة، تدريب 100 ألف رائد أعمال.</p>
        </div>
        </div>
</body>
</html>
